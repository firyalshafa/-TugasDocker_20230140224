<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Input Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFD1DA;
            --light-pink: #FFF0F3;
            --warm-pink: #F4ABB4;
            --wood-brown: #6D4C41;
            --shadow: rgba(244, 171, 180, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--light-pink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
        }

        .card {
            background: white;
            border: 2px solid var(--soft-pink);
            border-radius: 25px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 15px 40px var(--shadow);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--wood-brown);
            margin-bottom: 25px;
            text-align: center;
        }

        .field { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--wood-brown);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--soft-pink);
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--warm-pink); box-shadow: 0 0 0 3px var(--light-pink); }

        .radio-group { display: flex; gap: 15px; }
        .radio-opt {
            flex: 1;
            border: 1.5px solid var(--soft-pink);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Hidden Radio */
        .radio-opt input { display: none; }
        .radio-opt:has(input:checked) {
            background: var(--soft-pink);
            border-color: var(--warm-pink);
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--warm-pink);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: var(--wood-brown);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Input Mahasiswa</h2>
    <form th:action="@{/submit}" method="post" th:object="${userData}" enctype="multipart/form-data">
        <div class="field">
            <label>Nama Lengkap</label>
            <input type="text" th:field="*{nama}" placeholder="Contoh: Firyal Shafa" required>
        </div>

        <div class="field">
            <label>NIM</label>
            <input type="text" th:field="*{nim}" placeholder="Contoh: 20230140224" required>
        </div>

        <div class="field">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
                <label class="radio-opt">
                    <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki"> ♂ Laki-laki
                </label>
                <label class="radio-opt">
                    <input type="radio" th:field="*{jenisKelamin}" value="Perempuan"> ♀ Perempuan
                </label>
            </div>
        </div>

        <div class="field">
            <label>Unggah Foto</label>
            <input type="file" name="file" accept="image/*" required>
        </div>

        <button type="submit" class="btn-save">Simpan ke Database</button>
        <a href="/home" class="btn-back">← Kembali ke Dashboard</a>
    </form>
</div>
</body>
</html>

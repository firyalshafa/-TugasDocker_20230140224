<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFD1DA; /* Base Pink */
            --light-pink: #FFF0F3; /* Background Creamy Pink */
            --warm-pink: #F4ABB4; /* Accent Pink */
            --wood-brown: #6D4C41; /* Text Brown */
            --soft-wood: #A1887F; /* Subtext */
            --shadow: rgba(244, 171, 180, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--light-pink);
            background-image:
                radial-gradient(circle at 10% 20%, #FFE4E8 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #FFDDE2 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid var(--soft-pink);
            border-radius: 30px;
            padding: 45px;
            width: 420px;
            box-shadow: 0 15px 35px var(--shadow);
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Profile Header */
        .profile-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--soft-pink);
            padding: 3px;
            margin: 0 auto 15px;
            background: white;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info h3 {
            font-family: 'Playfair Display', serif;
            color: var(--wood-brown);
            font-size: 1.2rem;
        }

        .profile-info p {
            font-size: 0.75rem;
            color: var(--soft-wood);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--wood-brown);
            text-align: center;
            margin-bottom: 25px;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--soft-wood);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--soft-pink);
            border-radius: 12px;
            background: #FFF;
            color: var(--wood-brown);
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--warm-pink);
            box-shadow: 0 0 0 4px rgba(244, 171, 180, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--soft-pink), var(--warm-pink));
            border: none;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(244, 171, 180, 0.3);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 171, 180, 0.4);
        }

        .error {
            color: #D81B60;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            background: #FFEBEE;
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="profile-area">
        <div class="profile-img">
            <img src="/images/foto-profil.jpg" alt="Firyal">
        </div>
        <div class="profile-info">
            <h3>Firyal Shafa Salsabila</h3>
            <p>20230140224 • Teknologi Informasi</p>
        </div>
    </div>

    <h2>Login Portal</h2>

    <form action="/login" method="post">
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="admin">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••">
        </div>
        <button type="submit">Masuk ke Dashboard</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>
</div>
</body>
</html>

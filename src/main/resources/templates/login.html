<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFFBEF;
            --yellow-soft: #F5E6A3;
            --yellow-mid: #EDD96B;
            --yellow-warm: #D4B84A;
            --brown-text: #4A3B1F;
            --brown-light: #7A6040;
            --shadow: rgba(180, 140, 40, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 20% 20%, #F9EFC0 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, #FDE9A0 0%, transparent 55%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
        }

        .card {
            background: rgba(255, 252, 235, 0.85);
            backdrop-filter: blur(10px);
            border: 1.5px solid var(--yellow-mid);
            border-radius: 24px;
            padding: 52px 48px;
            width: 400px;
            box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(200,160,40,0.08);
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .deco {
            width: 48px;
            height: 4px;
            background: linear-gradient(90deg, var(--yellow-mid), var(--yellow-warm));
            border-radius: 2px;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--brown-text);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--brown-light);
            margin-bottom: 36px;
            font-weight: 300;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--brown-light);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--yellow-soft);
            border-radius: 12px;
            background: rgba(255,253,240,0.9);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--brown-text);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input:focus {
            border-color: var(--yellow-warm);
            box-shadow: 0 0 0 3px rgba(212, 184, 74, 0.18);
        }

        input::placeholder { color: #C5B07A; }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--yellow-mid), var(--yellow-warm));
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--brown-text);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(180,140,40,0.22);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(180,140,40,0.3);
        }

        button:active { transform: translateY(0); }

        .error {
            margin-top: 16px;
            padding: 10px 14px;
            background: rgba(255,200,100,0.2);
            border-left: 3px solid var(--yellow-warm);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #8B5E0A;
        }

        .ornament {
            text-align: center;
            margin-top: 28px;
            font-size: 1.2rem;
            opacity: 0.3;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="deco"></div>
    <h2>Selamat Datang</h2>
    <p class="subtitle">Silakan masuk untuk melanjutkan</p>

    <form action="/login" method="post">
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="Masukkan username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password">
        </div>
        <button type="submit">Masuk</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <div class="ornament">✦ ✦ ✦</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFFBEF;
            --yellow-soft: #F5E6A3;
            --yellow-mid: #EDD96B;
            --yellow-warm: #D4B84A;
            --brown-text: #4A3B1F;
            --brown-light: #7A6040;
            --shadow: rgba(180, 140, 40, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 10% 10%, #F9EFC0 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, #FDE9A0 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--brown-text);
        }

        .topbar {
            background: linear-gradient(135deg, var(--yellow-mid), var(--yellow-warm));
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 16px rgba(180,140,40,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--brown-text);
        }

        .topbar-nim {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--brown-light);
            background: rgba(255,252,230,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .welcome-card {
            background: rgba(255,252,235,0.9);
            border: 1.5px solid var(--yellow-soft);
            border-radius: 18px;
            padding: 24px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px var(--shadow);
            flex-wrap: wrap;
            gap: 16px;
        }

        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--brown-text);
            margin-bottom: 4px;
        }

        .welcome-text p {
            font-size: 0.82rem;
            color: var(--brown-light);
            font-weight: 300;
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--yellow-mid), var(--yellow-warm));
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--brown-text);
            text-decoration: none;
            box-shadow: 0 3px 12px rgba(180,140,40,0.22);
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(180,140,40,0.3);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: var(--brown-text);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--yellow-mid), transparent);
        }

        .table-wrap {
            background: rgba(255,252,235,0.9);
            border: 1.5px solid var(--yellow-soft);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: linear-gradient(135deg, var(--yellow-mid), var(--yellow-warm));
        }

        thead th {
            padding: 14px 18px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--brown-text);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: left;
        }

        thead th:first-child { width: 60px; text-align: center; }

        tbody tr {
            border-bottom: 1px solid rgba(237,217,107,0.25);
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(245,230,163,0.2); }

        tbody td {
            padding: 14px 18px;
            font-size: 0.9rem;
            color: var(--brown-text);
        }

        tbody td:first-child {
            text-align: center;
            font-weight: 500;
            color: var(--brown-light);
            font-size: 0.82rem;
        }

        .empty-row td {
            text-align: center;
            padding: 36px;
            color: #B5A070;
            font-size: 0.88rem;
            font-style: italic;
        }

        .badge-gender {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .badge-lk {
            background: rgba(180,200,255,0.25);
            color: #3A5A9A;
            border: 1px solid rgba(120,150,220,0.3);
        }

        .badge-pr {
            background: rgba(255,180,200,0.25);
            color: #9A3A5A;
            border: 1px solid rgba(220,120,150,0.3);
        }

        .footer-row {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-logout {
            padding: 9px 20px;
            border: 1.5px solid var(--yellow-mid);
            border-radius: 10px;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--brown-light);
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-logout:hover { background: rgba(237,217,107,0.15); }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">✦ MY Website 20230140224</div>
    <div class="topbar-nim">Selamat datang di aplikasi!</div>
</div>

<div class="container">

    <div class="welcome-card">
        <div class="welcome-text">
            <h1>Dashboard Mahasiswa</h1>
            <p>Data bersifat temporary — tidak disimpan di database</p>
        </div>
        <a href="/form" class="btn-add">＋ Input Data Mahasiswa</a>
    </div>

    <div class="section-title">Data Mahasiswa</div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${dataList == null or dataList.isEmpty()}" class="empty-row">
                <td colspan="4">Belum ada data</td>
            </tr>
            <tr th:each="item, stat : ${dataList}">
                <td th:text="${stat.index + 1}">1</td>
                <td th:text="${item.nama}">-</td>
                <td th:text="${item.nim}">-</td>
                <td>
                            <span th:if="${item.jenisKelamin == 'Laki-laki'}"
                                  class="badge-gender badge-lk" th:text="${item.jenisKelamin}"></span>
                    <span th:if="${item.jenisKelamin == 'Perempuan'}"
                          class="badge-gender badge-pr" th:text="${item.jenisKelamin}"></span>
                    <span th:if="${item.jenisKelamin != 'Laki-laki' and item.jenisKelamin != 'Perempuan'}"
                          th:text="${item.jenisKelamin ?: '-'}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-row">
        <a href="/logout" class="btn-logout">⇤ Logout</a>
    </div>

</div>
</body>
</html>

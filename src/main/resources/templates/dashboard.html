<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Mahasiswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFD1DA;
            --light-pink: #FFF0F3;
            --warm-pink: #F4ABB4;
            --wood-brown: #6D4C41;
            --brown-light: #8D6E63;
            --shadow: rgba(244, 171, 180, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--light-pink);
            background-image:
                radial-gradient(circle at 10% 10%, #FFE4E8 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #FFDDE2 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--wood-brown);
        }

        .topbar {
            background: linear-gradient(135deg, var(--soft-pink), var(--warm-pink));
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid var(--soft-pink);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 25px var(--shadow);
        }

        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--wood-brown);
        }

        .btn-add {
            padding: 12px 24px;
            background: var(--warm-pink);
            border-radius: 12px;
            font-weight: 500;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn-add:hover { transform: translateY(-2px); background: #e599a3; }

        .table-wrap {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--soft-pink);
            box-shadow: 0 10px 30px var(--shadow);
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--soft-pink); }
        thead th {
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--wood-brown);
            text-align: left;
        }

        tbody td { padding: 15px; border-bottom: 1px solid var(--light-pink); vertical-align: middle; }

        .img-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--soft-pink);
        }

        .badge-gender {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-lk { background: #E3F2FD; color: #1E88E5; }
        .badge-pr { background: #FCE4EC; color: #D81B60; }

        .btn-logout {
            margin-top: 20px;
            display: inline-block;
            color: var(--soft-wood);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">✦ Firyal's Space | 20230140224</div>
    <div style="color: white; font-size: 0.9rem;">S1 Teknologi Informasi</div>
</div>

<div class="container">
    <div class="welcome-card">
        <div class="welcome-text">
            <h1>Data Mahasiswa</h1>
            <p style="color: var(--brown-light); font-size: 0.85rem;">Terhubung dengan Database MySQL</p>
        </div>
        <a href="/form" class="btn-add">＋ Tambah Data</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Foto</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Gender</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${dataList.isEmpty()}">
                <td colspan="5" style="text-align: center; padding: 40px; color: var(--soft-wood);">Belum ada data mahasiswa.</td>
            </tr>
            <tr th:each="item, stat : ${dataList}">
                <td th:text="${stat.index + 1}">1</td>
                <td>
                    <img th:if="${item.foto}" th:src="@{'/uploads/' + ${item.foto}}" class="img-thumb">
                    <img th:unless="${item.foto}" src="https://via.placeholder.com/50" class="img-thumb">
                </td>
                <td th:text="${item.nama}" style="font-weight: 500;">-</td>
                <td th:text="${item.nim}">-</td>
                <td>
                    <span th:if="${item.jenisKelamin == 'Laki-laki'}" class="badge-gender badge-lk">Laki-laki</span>
                    <span th:if="${item.jenisKelamin == 'Perempuan'}" class="badge-gender badge-pr">Perempuan</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a href="/logout" class="btn-logout">⇤ Logout dari sistem</a>
</div>
</body>
</html>
